let robuxAnswered = 0, robuxCorrect = 0;
function checkRobux(btn) {
  const parent = btn.parentElement;
  if (parent.dataset.answered) return;
  parent.dataset.answered = '1';
  const ok = btn.textContent.trim() === parent.dataset.answer;
  parent.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === parent.dataset.answer) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  if (ok) robuxCorrect++;
  robuxAnswered++;
  const total = 4;
  if (robuxAnswered >= total) {
    const el = document.getElementById('robuxResult');
    el.textContent = `Score: ${robuxCorrect}/${total} — ${robuxCorrect >= 3 ? 'Great job!' : 'Try again tomorrow!'}`;
    if (robuxCorrect >= 3) awardQuest(25, 'Robux math crushed!');
  }
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return {
      blockDone: s.blockDone || {},
      ideaPicked: s.ideaPicked || {},
      panelOpen: s.panelOpen || {},
      points: s.points || 0,
      streak: s.streak || 0,
      lastDate: s.lastDate || null,
      mathBest: s.mathBest || 0,
      creatorChecks: s.creatorChecks || {},
    };
  } catch { return { blockDone:{}, ideaPicked:{}, panelOpen:{}, points:0, streak:0, lastDate:null, mathBest:0, creatorChecks:{} }; }
}

function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDate === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  if (state.lastDate === yesterday.toDateString()) state.streak = (state.streak || 0) + 1;
  else if (state.lastDate !== today) state.streak = 1;
  state.lastDate = today;
  saveState();
}

let state = loadState();
updateStreak();

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function awardQuest(pts, msg) {
  state.points = (state.points || 0) + pts;
  saveState();
  updateStats();
  showToast(msg + ` (+${pts} pts)`);
}

function updateStats() {
  document.getElementById('pointsDisplay').textContent = state.points || 0;
  document.getElementById('streakDisplay').textContent = state.streak || 0;
  document.getElementById('mathBest').textContent = state.mathBest || 0;
}

function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmt12(t) { let [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${m.toString().padStart(2,'0')} ${ap}`; }

function render() {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const pct = Math.min(100, Math.max(0, ((nowMin-480)/480)*100));
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = Math.round(pct)+'%';
  document.getElementById('currentTime').textContent = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateBadge').textContent = `${days[now.getDay()]}, ${mon[now.getMonth()]} ${now.getDate()}`;

  let done = 0;
  schedule.forEach((item, i) => {
    const isNow = nowMin >= toMin(item.start) && nowMin < toMin(item.end);
    const isDone = !!state.blockDone[i];
    const isOpen = !!state.panelOpen[i];
    if (isDone) done++;

    const block = document.createElement('div');
    block.className = `block ${item.cat}${isDone?' done':''}${isNow?' active-now':''}`;
    const nowBadge = isNow && !isDone ? '<div class="now-badge">▶ Now</div>' : '';
    const ideasBtn = item.ideas ? `<div class="ideas-btn" data-block="${i}">💡</div>` : '';

    block.innerHTML = `${nowBadge}
      <div class="block-main" data-check="${i}">
        <div class="block-emoji">${item.emoji}</div>
        <div class="block-info">
          <div class="block-time">${fmt12(item.start)} – ${fmt12(item.end)}</div>
          <div class="block-title">${item.title}</div>
          <div class="block-desc">${item.desc}</div>
        </div>
        <div class="block-actions">${ideasBtn}<div class="block-check"></div></div>
      </div>`;

    if (item.ideas) {
      const panel = document.createElement('div');
      panel.className = `ideas-panel${isOpen?' open':''}`;
      const picked = state.ideaPicked[i] || {};
      panel.innerHTML = `<div class="ideas-panel-inner"><h4>💡 Pick an activity</h4>${item.ideas.map((idea,j) => {
        const isPicked = !!picked[j];
        let badge = idea.type==='game'?'<span class="badge-game">🎮 PLAY</span>':idea.type==='link'?'<span class="badge-link">🔗 OPEN</span>':idea.type==='quest'?'<span class="badge-quest">⚔️ QUEST</span>':'';
        return `<div class="idea-item${isPicked?' picked':''}" data-block="${i}" data-idea="${j}" ${idea.gameId?`data-game="${idea.gameId}"`:''} ${idea.url?`data-link="${idea.url}"`:''} ${idea.questId?`data-quest="${idea.questId}"`:''}>
          <div class="idea-check"></div><div class="idea-text"><div class="idea-name">${idea.emoji} ${idea.name}${badge}</div><div class="idea-sub">${idea.sub}</div></div></div>`;
      }).join('')}</div>`;
      block.appendChild(panel);
    }

    block.querySelector('.block-main').addEventListener('click', e => {
      if (e.target.closest('.ideas-btn')) return;
      state.blockDone[i] = !state.blockDone[i];
      if (state.blockDone[i]) awardQuest(10, 'Block complete!');
      else { state.points = Math.max(0, (state.points||0)-10); saveState(); updateStats(); }
      saveState(); render();
    });

    if (item.ideas) {
      block.querySelector('.ideas-btn').addEventListener('click', e => {
        e.stopPropagation();
        state.panelOpen[i] = !state.panelOpen[i];
        saveState(); render();
      });
      block.querySelectorAll('.idea-item').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const bi = parseInt(el.dataset.block), ji = parseInt(el.dataset.idea);
          if (!state.ideaPicked[bi]) state.ideaPicked[bi] = {};
          state.ideaPicked[bi][ji] = !state.ideaPicked[bi][ji];
          saveState();
          if (el.dataset.game) { openModal(el.dataset.game); return; }
          if (el.dataset.link) { window.open(el.dataset.link, '_blank'); render(); return; }
          if (el.dataset.quest) { openQuest(el.dataset.quest); render(); return; }
          render();
        });
      });
    }
    container.appendChild(block);
  });

  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = schedule.length;
  const tn = document.getElementById('timeNow');
  if (nowMin >= 480 && nowMin < 960) {
    const cur = schedule.find(s => nowMin >= toMin(s.start) && nowMin < toMin(s.end));
    tn.textContent = cur ? `Right now: ${cur.emoji} ${cur.title}` : '';
  } else if (nowMin < 480) tn.textContent = '⏳ Day starts at 8:00 AM';
  else tn.textContent = '🎉 Day complete! Great job today!';
  updateStats();
}

let readingIdx = null, readingAnswers = {}, readingTimer = null, readingSeconds = 20*60;

function startReadingGame() {
  readingIdx = null;
  document.getElementById('readingGame').innerHTML = `
    <p style="margin-bottom:12px;opacity:.85">Choose a passage — read carefully, then take the quiz.</p>
    ${readingPassages.map((p,i)=>`<div class="passage-pick" onclick="showReadingPassage(${i})"><strong>${p.title}</strong><span>${p.theme} · ${p.time}</span></div>`).join('')}`;
}

function showReadingPassage(i) {
  readingIdx = i;
  readingAnswers = {};
  const p = readingPassages[i];
  readingSeconds = parseInt(p.time) * 60 || 1200;
  document.getElementById('readingGame').innerHTML = `
    <div class="timer-row">
      <div class="timer-display" id="readTimer">${fmtTimer(readingSeconds)}</div>
      <button class="timer-btn" onclick="toggleReadTimer()">Start/Pause</button>
    </div>
    <div class="passage-box"><h3>${p.title}</h3>${p.text.split('\n\n').map(x=>`<p style="margin-bottom:10px">${x}</p>`).join('')}</div>
    <button class="action-btn" onclick="startReadingQuiz()">Take Comprehension Quiz</button>
    <button class="action-btn secondary" onclick="startReadingGame()">← Back to list</button>`;
}

function fmtTimer(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function toggleReadTimer() {
  if (readingTimer) { clearInterval(readingTimer); readingTimer = null; return; }
  readingTimer = setInterval(() => {
    readingSeconds--;
    const el = document.getElementById('readTimer');
    if (el) el.textContent = fmtTimer(readingSeconds);
    if (readingSeconds <= 0) { clearInterval(readingTimer); readingTimer = null; showToast('Reading time complete!'); }
  }, 1000);
}

function startReadingQuiz() {
  if (readingIdx === null) return;
  const p = readingPassages[readingIdx];
  document.getElementById('readingGame').innerHTML = `
    <p style="margin-bottom:14px;font-weight:600">${p.title} — Quiz</p>
    ${p.quiz.map((q,qi)=>`<div class="quiz-q"><p>${qi+1}. ${q.q}</p>
      ${q.options.map((o,oi)=>`<button class="quiz-opt" onclick="pickReading(${qi},${oi},${q.correct})">${o}</button>`).join('')}</div>`).join('')}
    <button class="action-btn" onclick="submitReadingQuiz()">Submit Quiz</button>`;
}

function pickReading(qi, oi, correct) {
  readingAnswers[qi] = oi;
  const parent = document.querySelectorAll('#readingGame .quiz-q')[qi];
  parent.querySelectorAll('.quiz-opt').forEach((b,j) => {
    b.classList.toggle('selected', j === oi);
  });
}

function submitReadingQuiz() {
  const p = readingPassages[readingIdx];
  let score = 0;
  p.quiz.forEach((q,qi) => {
    const parent = document.querySelectorAll('#readingGame .quiz-q')[qi];
    parent.querySelectorAll('.quiz-opt').forEach((b,j) => {
      if (j === q.correct) b.classList.add('correct');
      else if (readingAnswers[qi] === j) b.classList.add('wrong');
    });
    if (readingAnswers[qi] === q.correct) score++;
  });
  const pct = Math.round((score/p.quiz.length)*100);
  const bonus = pct >= 80 ? 40 : pct >= 60 ? 25 : 15;
  awardQuest(bonus, `Quiz ${score}/${p.quiz.length} (${pct}%)`);
  document.getElementById('readingGame').innerHTML += `<p style="text-align:center;margin-top:16px;font-weight:700">Score: ${score}/${p.quiz.length} — ${pct >= 80 ? 'Excellent!' : 'Keep reading!'}</p>
    <button class="action-btn secondary" onclick="startReadingGame()">Try Another Passage</button>`;
}

/* ── MATH BLASTER ── */
let mathQ={}, mathScore=0, mathNum=0, mathTotal=10, mathLocked=false;
function startMathGame() { mathScore=0; mathNum=0; mathLocked=false; nextMathQ(); }
function nextMathQ() {
  if (mathNum >= mathTotal) { showMathResult(); return; }
  const a=Math.floor(Math.random()*12)+1, b=Math.floor(Math.random()*12)+1, ans=a*b;
  const wrongs=new Set();
  while(wrongs.size<3){ const w=Math.max(1,ans+Math.floor(Math.random()*20)-10); if(w!==ans) wrongs.add(w); }
  const opts=[ans,...wrongs].sort(()=>Math.random()-.5);
  mathQ={a,b,ans,opts}; mathLocked=false;
  document.getElementById('mathGame').innerHTML=`
    <div class="score-bar"><span>Question <strong>${mathNum+1}</strong> / ${mathTotal}</span><span>Score <strong>${mathScore}</strong></span></div>
    <div class="question-box"><div class="q-label">What is</div><div class="q-text">${a} × ${b} = ?</div></div>
    <div class="choices">${opts.map(o=>`<button class="choice-btn" onclick="pickMath(this,${o},${ans})">${o}</button>`).join('')}</div>
    <div class="feedback" id="mathFeedback"></div>`;
}
function pickMath(btn,picked,ans) {
  if (mathLocked) return; mathLocked=true;
  const fb=document.getElementById('mathFeedback');
  if (picked===ans) { btn.classList.add('correct'); fb.textContent='🎉 Correct!'; mathScore++; }
  else { btn.classList.add('wrong'); fb.textContent=`❌ Answer: ${ans}`;
    document.querySelectorAll('.choice-btn').forEach(b=>{ if(parseInt(b.textContent)===ans) b.classList.add('correct'); }); }
  mathNum++; setTimeout(nextMathQ, 1100);
}
function showMathResult() {
  if (mathScore > (state.mathBest||0)) { state.mathBest = mathScore; saveState(); updateStats(); }
  const bonus = mathScore >= 9 ? 35 : mathScore >= 7 ? 25 : 15;
  awardQuest(bonus, `Math Blaster ${mathScore}/${mathTotal}`);
  const msg = mathScore===10?'PERFECT! 🏆':mathScore>=8?'Awesome! 🌟':'Good try — play again!';
  document.getElementById('mathGame').innerHTML=`<div class="result-box"><div class="big-score">${mathScore}/${mathTotal}</div><p>${msg}</p></div>
    <button class="play-again-btn" onclick="startMathGame()">🔄 Play Again</button>`;
}

/* ── WORD SCRAMBLE ── */
const wordBank=[
  {word:'RIVALS',hint:'Your favorite Roblox shooter'},
  {word:'CHAMPION',hint:'The winner'},
  {word:'ROBLOX',hint:'The platform you build on'},
  {word:'YOUTUBE',hint:'Where creators post videos'},
  {word:'STRATEGY',hint:'A plan to win'},
  {word:'BOXING',hint:'Fighting sport with gloves'},
  {word:'ADVENTURE',hint:'An exciting journey'},
  {word:'CREATOR',hint:'Someone who makes videos'},
  {word:'STUDIO',hint:'Where you build games'},
  {word:'TREASURE',hint:'Hidden valuable loot'},
  {word:'LEGENDARY',hint:'Super famous and rare'},
  {word:'GRAVITY',hint:'Pulls things down'},
  {word:'OBSTACLE',hint:'Something in your way'},
  {word:'POWERFUL',hint:'Very strong'},
  {word:'STREAMER',hint:'Person who broadcasts gameplay'},
];
let wgScore=0, wgNum=0, wgTotal=8, wgLocked=false, wgUsed=[];
function scramble(w){const a=[...w];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join('')===w?scramble(w):a.join('');}
function startWordGame(){wgScore=0;wgNum=0;wgLocked=false;wgUsed=[];nextWordQ();}
function nextWordQ(){
  if(wgNum>=wgTotal){showWordResult();return;}
  const available=wordBank.filter((_,i)=>!wgUsed.includes(i));
  const entry=available[Math.floor(Math.random()*available.length)];
  wgUsed.push(wordBank.indexOf(entry));
  const sc=scramble(entry.word);
  const wrongs=wordBank.filter(w=>w.word!==entry.word).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.word);
  const opts=[entry.word,...wrongs].sort(()=>Math.random()-.5);
  wgLocked=false;
  document.getElementById('wordGame').innerHTML=`
    <div class="wg-score-bar"><span>Question <strong>${wgNum+1}</strong> / ${wgTotal}</span><span>Score <strong>${wgScore}</strong></span></div>
    <div class="word-box"><div class="wg-hint">💬 ${entry.hint}</div><div class="scrambled">${sc}</div></div>
    <div class="wg-choices">${opts.map(o=>`<button class="wg-btn" onclick="pickWord(this,'${o}','${entry.word}')">${o}</button>`).join('')}</div>
    <div class="wg-feedback" id="wgFeedback"></div>`;
}
function pickWord(btn,picked,ans){
  if(wgLocked)return;wgLocked=true;
  const fb=document.getElementById('wgFeedback');
  if(picked===ans){btn.classList.add('correct');fb.textContent='🎉 Correct!';wgScore++;}
  else{btn.classList.add('wrong');fb.textContent=`❌ It was: ${ans}`;
    document.querySelectorAll('.wg-btn').forEach(b=>{if(b.textContent===ans)b.classList.add('correct');});}
  wgNum++;setTimeout(nextWordQ,1200);
}
function showWordResult(){
  const bonus=wgScore>=7?30:wgScore>=5?20:10;
  awardQuest(bonus,`Word Scramble ${wgScore}/${wgTotal}`);
  document.getElementById('wordGame').innerHTML=`<div class="wg-result"><div class="big-score">${wgScore}/${wgTotal}</div><p>${wgScore>=7?'Word master!':'Keep reading!'}</p></div>
    <button class="wg-again-btn" onclick="startWordGame()">🔄 Play Again</button>`;
}

render();
setInterval(render, 60000);
</script>
