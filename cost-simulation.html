<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirement Everest — Cost Planning</title>
<link rel="stylesheet" href="styles.css">
<style>
.wrap { max-width: 1000px; margin: 0 auto; padding: 36px 24px 80px; }
.loc-tabs { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
.loc-tab { padding: 10px 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); cursor: pointer; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; }
.loc-tab.active { background: color-mix(in srgb, var(--accent) 12%, var(--panel)); color: var(--accent); border-color: var(--accent); }
.panel { display: none; }
.panel.active { display: block; }
.note { background: color-mix(in srgb, var(--accent) 8%, var(--panel)); border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border)); padding: 14px 18px; border-radius: 4px; margin-bottom: 24px; font-size: 0.82rem; line-height: 1.6; }
.scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
.scenario-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
.scenario-card h4 { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.big { font-size: 1.8rem; font-weight: 600; color: var(--accent); }
.sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
header.page { padding: 28px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
header.page h1 { font-family: var(--heading-font); font-size: 1.3rem; color: var(--accent); }
</style>
</head>
<body class="theme-hub">
<div id="host-content" style="display:none">
<header class="page">
  <h1>Retirement Everest · Cost Planning</h1>
  <a href="host.html" style="margin-left:auto;font-size:0.78rem;color:var(--muted);text-decoration:none">Command center</a>
  <a href="index.html" style="font-size:0.78rem;color:var(--muted);text-decoration:none">← Hub</a>
</header>
<div class="wrap">
  <div class="loc-tabs" id="locTabs"></div>
  <div id="panels"></div>
</div>
</div>
<script src="locations.js"></script>
<script src="host-auth.js"></script>
<script>
function initCostPlanning() {
  const tabs = document.getElementById('locTabs');
  const panels = document.getElementById('panels');
  const locs = Object.values(RETIREMENT_EVEREST.locations);

  locs.forEach((loc, i) => {
    const btn = document.createElement('button');
    btn.className = 'loc-tab' + (i === 0 ? ' active' : '');
    btn.textContent = loc.shortName;
    btn.onclick = () => {
      document.querySelectorAll('.loc-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + loc.slug).classList.add('active');
    };
    tabs.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + loc.slug;
    const sim = loc.costSim;
    const cards = sim.scenarios.map(s => {
      if (loc.type === 'screening' || loc.type === 'preorder') {
        return `<div class="scenario-card"><h4>${s.guests} guests</h4>
          <div class="big">${'$' + s.median.toLocaleString()}</div>
          <div class="sub">Median total · ~$${s.perGuest}/guest</div>
          <div class="sub">Range: $${s.p10.toLocaleString()} – $${s.p90.toLocaleString()}</div></div>`;
      }
      return `<div class="scenario-card"><h4>${s.reservations} reservations (~${s.guests} guests)</h4>
        <div class="big">${'$' + s.median.toLocaleString()}</div>
        <div class="sub">Median · ~$${s.perRes}/reservation</div>
        <div class="sub">Safe budget: $${s.safe.toLocaleString()}</div></div>`;
    }).join('');
    panel.innerHTML = `<div class="note">${sim.note}</div><div class="scenario-grid">${cards}</div>
      <p style="margin-top:24px;font-size:0.72rem;color:var(--muted);font-style:italic">Static planning figures from Monte Carlo runs. Update locations.js when venue pricing changes. Live guest data is in <a href="host.html?location=${loc.slug}" style="color:var(--accent)">host dashboard</a>.</p>`;
    panels.appendChild(panel);
  });
}

initHostLock({
  contentId: 'host-content',
  title: 'Host Access',
  subtitle: 'Enter password to open cost planning.',
  onUnlock: initCostPlanning
});
</script>
</body>
</html>
