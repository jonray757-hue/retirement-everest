<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirement Everest — Event Series</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="theme-hub">
  <div class="hero hero--hub">
    <div class="hero-bg has-image" id="hubHeroBg"></div>
    <div class="hero-content hub-hero">
    <div class="eyebrow">Brett Kitchen &amp; Ethan Kap Present</div>
    <h1>Retirement Everest</h1>
    <p>Private film screenings and retreats across the Pacific Northwest. Select your location to reserve your seat or stay.</p>
    </div>
  </div>
  <div class="loc-grid" id="locGrid"></div>
  <div class="hub-admin">
    <a href="host.html">Command center</a>
    <a href="cost-simulation.html">Cost planning</a>
  </div>
  <script src="locations.js"></script>
  <script>
    const hero = RETIREMENT_EVEREST.hero;
    if (hero?.image) {
      document.getElementById('hubHeroBg').innerHTML = `
        <picture>
          ${hero.imageMobile ? `<source media="(max-width: 768px)" srcset="${hero.imageMobile}">` : ''}
          <img src="${hero.image}" alt="${hero.alt || 'Retirement Everest'}">
        </picture>
        <div class="hero-overlay"></div>`;
    }
    const grid = document.getElementById('locGrid');
    Object.values(RETIREMENT_EVEREST.locations).forEach(loc => {
      const typeLabels = { retreat: 'Overnight Retreat', screening: 'Screening + Dinner', preorder: 'Screening + Dinner' };
      const typeLabel = typeLabels[loc.type] || 'Event';
      const a = document.createElement('a');
      a.className = 'loc-card';
      a.href = `guest.html?location=${loc.slug}`;
      a.innerHTML = `
        <div class="loc-type">${typeLabel}</div>
        <h2>${loc.shortName}</h2>
        <p>${loc.name}<br>${loc.city}</p>
        <div class="go">Reserve →</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
